name: ci
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    # Ephemeral Postgres for the integration tests. Without DATABASE_URL the
    # DB-touching auth tests skip; with this service they run for real on every
    # PR/push. Throwaway data — torn down with the job.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: buildingsync_test
        ports:
          - 5432:5432
        # Wait until Postgres is accepting connections before steps run.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Single local DB for both the app runtime and migrations/DDL.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/buildingsync_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/buildingsync_test
      # Required by lib/auth-core for the session/action token tests.
      AUTH_SECRET: ci-test-secret-at-least-32-characters-long
      IMPERSONATION_SIGNING_SECRET: ci-test-impersonation-secret-32-chars-min

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # Repo intentionally doesn't commit package-lock.json (.gitignore line 47,
      # mirroring the R&D convention). `npm ci` requires a lockfile, so use install.
      # postinstall runs `prisma generate || true` automatically.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # Bundles prisma generate + tsc --noEmit. Devs run `npm run verify` before
      # pushing; CI runs the same.
      - name: Verify (prisma generate + typecheck)
        run: npm run verify

      # Apply the schema to the ephemeral DB so the integration tests have real
      # tables to write to.
      - name: Apply migrations
        run: npx prisma migrate deploy

      # Unit + integration tests. With DATABASE_URL set (above) the DB-touching
      # auth flow tests run instead of skipping.
      - name: Test
        run: npm test

      # ESLint now gates merges: the react-hooks backlog has been cleared and the
      # remaining over-strict React Compiler rules (set-state-in-effect, purity,
      # immutability, exhaustive-deps) are downgraded to warnings in
      # eslint.config.mjs. `npm run lint` therefore exits 0 on a clean tree;
      # warnings stay visible without blocking. Bump to `lint:strict`
      # (--max-warnings=0) once the warning backlog is also burned down.
      - name: Lint
        run: npm run lint

      # The production build is the definitive "will it ship" check. Without this
      # step a build-breaking change could merge green (typecheck alone misses
      # bundler/route/server-component failures). The build is env-safe — every
      # process.env.X! read lives inside request-time server actions, not at
      # module top level — so it compiles without secrets in CI.
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      # Informational only — Dependabot opens PRs for fixes, so don't block CI
      # on transitive vulns. --omit=dev skips devDependencies which often have
      # noisy advisories that don't affect production.
      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev || true
