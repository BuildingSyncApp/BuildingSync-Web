<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 1140" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5f6368"/>
    </marker>
    <style>
      .lbl  { fill:#202124; }
      .sm   { fill:#3c4043; }
      .xs   { fill:#5f6368; }
      .edge { stroke:#5f6368; stroke-width:2; fill:none; marker-end:url(#arrow); }
      text  { text-anchor:middle; }
    </style>
  </defs>

  <rect x="0" y="0" width="1120" height="1140" fill="#ffffff"/>

  <!-- Title -->
  <text x="560" y="32" font-size="22" font-weight="700" class="lbl">BuildingSync — Authentication &amp; Authorization</text>
  <text x="560" y="54" font-size="13" class="xs">One Next.js app · 3 portals · every data action crosses 3 walls</text>

  <!-- START -->
  <rect x="460" y="74" width="200" height="40" rx="8" fill="#f1f3f4" stroke="#5f6368"/>
  <text x="560" y="99" font-size="14" class="lbl">Incoming request</text>
  <line class="edge" x1="560" y1="114" x2="560" y2="144"/>

  <!-- PROXY -->
  <rect x="400" y="144" width="320" height="52" rx="8" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="560" y="166" font-size="14" font-weight="600" class="lbl">proxy.ts (middleware)</text>
  <text x="560" y="184" font-size="11" class="sm">refresh Supabase session · rewrite admin host → /platform</text>
  <line class="edge" x1="560" y1="196" x2="560" y2="222"/>

  <!-- DEC1 signed in -->
  <rect x="468" y="222" width="184" height="48" rx="24" fill="#fef7e0" stroke="#f9ab00"/>
  <text x="560" y="244" font-size="14" font-weight="600" class="lbl">Signed in?</text>
  <text x="560" y="260" font-size="10" class="xs">(Supabase session cookie)</text>

  <!-- No -> signin -->
  <line class="edge" x1="652" y1="246" x2="744" y2="246"/>
  <text x="695" y="238" font-size="11" class="xs">No</text>
  <rect x="744" y="224" width="150" height="44" rx="8" fill="#f1f3f4" stroke="#5f6368"/>
  <text x="819" y="251" font-size="13" class="lbl">→ /signin</text>

  <!-- Yes -> getuser -->
  <line class="edge" x1="560" y1="270" x2="560" y2="298"/>
  <text x="576" y="288" font-size="11" class="xs">Yes</text>

  <!-- GETUSER -->
  <rect x="398" y="298" width="324" height="56" rx="8" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="560" y="320" font-size="14" font-weight="600" class="lbl">getOrCreateAppUser()</text>
  <text x="560" y="338" font-size="10" class="sm">Prisma User ← same uuid as Supabase auth.uid()</text>
  <text x="800" y="318" font-size="11" font-weight="700" fill="#188038">AUTHENTICATION ✓</text>

  <line class="edge" x1="560" y1="354" x2="560" y2="382"/>

  <!-- DEC2 role -->
  <rect x="480" y="382" width="160" height="46" rx="23" fill="#fef7e0" stroke="#f9ab00"/>
  <text x="560" y="410" font-size="14" font-weight="600" class="lbl">Which role?</text>

  <!-- fan to portals -->
  <line class="edge" x1="535" y1="426" x2="170" y2="466"/>
  <line class="edge" x1="552" y1="428" x2="430" y2="466"/>
  <line class="edge" x1="578" y1="428" x2="690" y2="466"/>
  <line class="edge" x1="582" y1="426" x2="950" y2="466"/>

  <!-- PORTALS row -->
  <rect x="20"  y="468" width="255" height="78" rx="8" fill="#f3e8fd" stroke="#a142f4"/>
  <text x="147" y="492" font-size="13" font-weight="700" class="lbl">admin</text>
  <text x="147" y="510" font-size="13" class="lbl">→ /platform</text>
  <text x="147" y="527" font-size="10" class="xs">requirePlatformAdmin()</text>
  <text x="147" y="540" font-size="9"  class="xs">+ admin.* host only</text>

  <rect x="295" y="468" width="255" height="78" rx="8" fill="#fce8e6" stroke="#ea8600"/>
  <text x="422" y="492" font-size="13" font-weight="700" class="lbl">building_manager</text>
  <text x="422" y="509" font-size="10" class="xs">(not verified yet)</text>
  <text x="422" y="528" font-size="12" class="lbl">→ /onboarding/pending</text>
  <text x="422" y="541" font-size="9"  class="xs">waits for admin verification</text>

  <rect x="570" y="468" width="255" height="78" rx="8" fill="#f3e8fd" stroke="#a142f4"/>
  <text x="697" y="491" font-size="11" font-weight="700" class="lbl">BM(verified) · FM · concierge</text>
  <text x="697" y="511" font-size="14" class="lbl">→ /team</text>
  <text x="697" y="529" font-size="10" class="xs">requireTeam()</text>
  <text x="697" y="542" font-size="9"  class="xs">per-persona nav</text>

  <rect x="845" y="468" width="255" height="78" rx="8" fill="#f3e8fd" stroke="#a142f4"/>
  <text x="972" y="490" font-size="11" font-weight="700" class="lbl">resident · tenant · owner</text>
  <text x="972" y="505" font-size="10" class="xs">· PM* · guest*</text>
  <text x="972" y="524" font-size="14" class="lbl">→ /dashboard</text>
  <text x="972" y="541" font-size="10" class="xs">requireUser()</text>

  <!-- portals -> merge (pending is a dead end) -->
  <line class="edge" x1="160" y1="546" x2="468" y2="606"/>
  <line class="edge" x1="690" y1="546" x2="615" y2="600"/>
  <line class="edge" x1="958" y1="546" x2="702" y2="608"/>

  <!-- MERGE action -->
  <rect x="420" y="600" width="280" height="50" rx="8" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="560" y="621" font-size="14" font-weight="600" class="lbl">User triggers an action</text>
  <text x="560" y="638" font-size="10" class="sm">e.g. hire staff · post announcement · serve notice</text>

  <!-- AUTHORIZATION group container -->
  <rect x="118" y="672" width="922" height="300" rx="12" fill="#f8f9fa" stroke="#dadce0"/>
  <text x="138" y="694" font-size="13" font-weight="700" text-anchor="start" fill="#5f6368">AUTHORIZATION · every data action crosses 3 walls</text>

  <line class="edge" x1="560" y1="650" x2="560" y2="708"/>

  <!-- WALL 1 -->
  <rect x="360" y="708" width="400" height="50" rx="8" fill="#fef7e0" stroke="#f9ab00"/>
  <text x="560" y="729" font-size="13" font-weight="700" class="lbl">WALL 1 — Identity / portal guard</text>
  <text x="560" y="747" font-size="10" class="sm">requireUser · requireTeam · requirePlatformAdmin</text>
  <line class="edge" x1="760" y1="733" x2="800" y2="733"/>
  <text x="780" y="726" font-size="9" class="xs">fail</text>
  <rect x="800" y="711" width="190" height="44" rx="8" fill="#f1f3f4" stroke="#5f6368"/>
  <text x="895" y="738" font-size="12" class="lbl">redirect away / 401</text>

  <line class="edge" x1="560" y1="758" x2="560" y2="786"/>
  <text x="577" y="776" font-size="10" class="xs">pass</text>

  <!-- WALL 2 (centralized) -->
  <rect x="360" y="786" width="400" height="60" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="3"/>
  <text x="560" y="809" font-size="13" font-weight="700" class="lbl">WALL 2 — Capability check  ★</text>
  <text x="560" y="828" font-size="11" class="sm">can(user, capability)</text>
  <text x="560" y="842" font-size="10" class="xs">backed by ROLE_CAPABILITIES</text>

  <!-- callout -->
  <rect x="130" y="788" width="212" height="56" rx="8" fill="#e6f4ea" stroke="#34a853"/>
  <text x="236" y="810" font-size="10" font-weight="700" fill="#188038">★ Centralized here (WS1)</text>
  <text x="236" y="828" font-size="11" fill="#188038" font-family="Consolas, monospace">lib/permissions.ts</text>
  <line class="edge" x1="342" y1="816" x2="360" y2="816"/>

  <line class="edge" x1="760" y1="812" x2="800" y2="812"/>
  <text x="780" y="805" font-size="9" class="xs">false</text>
  <rect x="800" y="790" width="190" height="44" rx="8" fill="#fce8e6" stroke="#d93025"/>
  <text x="895" y="817" font-size="12" fill="#c5221f">403 / denied</text>

  <line class="edge" x1="560" y1="846" x2="560" y2="874"/>
  <text x="582" y="864" font-size="10" class="xs">allowed</text>

  <!-- WALL 3 -->
  <rect x="360" y="874" width="400" height="58" rx="8" fill="#fef7e0" stroke="#f9ab00"/>
  <text x="560" y="896" font-size="13" font-weight="700" class="lbl">WALL 3 — Ownership scope</text>
  <text x="560" y="915" font-size="10" class="sm">where buildingId = your building (app-level) · RLS guards the Postgres Data API only</text>
  <line class="edge" x1="760" y1="901" x2="800" y2="901"/>
  <text x="780" y="894" font-size="9" class="xs">other</text>
  <rect x="800" y="879" width="190" height="44" rx="8" fill="#fce8e6" stroke="#d93025"/>
  <text x="895" y="906" font-size="12" fill="#c5221f">403 / denied</text>

  <!-- to success -->
  <line class="edge" x1="560" y1="932" x2="560" y2="990"/>
  <text x="577" y="962" font-size="10" class="xs">ok</text>

  <!-- SUCCESS -->
  <rect x="395" y="990" width="330" height="46" rx="8" fill="#e6f4ea" stroke="#34a853"/>
  <text x="560" y="1018" font-size="13" font-weight="700" fill="#188038">✓ Action runs + AuditLog (append-only)</text>

  <!-- footnote -->
  <text x="560" y="1068" font-size="10" font-style="italic" class="xs">* property_manager &amp; guest are defined in the role enum but not wired to a portal — they currently fall through to /dashboard.</text>
  <text x="560" y="1084" font-size="10" class="xs">Authentication = "who are you" (Supabase + Prisma).  Authorization = "what may you do" (3 walls).</text>
</svg>
